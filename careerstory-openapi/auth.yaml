openapi: 3.0.1
info:
  title: CareerStory Auth API
  description: API for user authentication and authorization.
  version: '1.0'
servers:
  - url: http://localhost:3000/api/v1
tags:
  - name: Auth
    description: Operations related to user authentication
paths:
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Register a new user
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupDto'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad request
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login a user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseDto'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
components:
  schemas:
    SignupDto:
      type: object
      properties:
        userName:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
        confirmPassword:
          type: string
    LoginDto:
      type: object
      properties:
        userName:
          type: string
        password:
          type: string
    ChangePasswordDto:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
        confirmPassword:
          type: string
    AuthResponseDto:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: number
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: ['USER', 'ADMIN']
        isEmailVerified:
          type: boolean
          default: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
